version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mca-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mca-mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=codingarena
    restart: unless-stopped

volumes:
  mca-mongo-data:
